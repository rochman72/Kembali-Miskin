<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Dashboard - XAUUSD</title>

    <!-- TradingView Chart Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 SMC - XAUUSD (OANDA)</h1>
</header>

<div class="layout">

    <!-- LEFT: Chart -->
    <section class="card">
        <h2>TradingView Chart</h2>
        <div id="tv-chart" style="height: 420px;"></div>

        <div class="tf-selector">
            <button onclick="changeTF('1')">M1</button>
            <button onclick="changeTF('3')">M3</button>
            <button onclick="changeTF('5')">M5</button>
            <button onclick="changeTF('15')">M15</button>
            <button onclick="changeTF('30')">M30</button>
            <button onclick="changeTF('60')">H1</button>
            <button onclick="changeTF('240')">H4</button>
            <button onclick="changeTF('1D')">D1</button>
            <button onclick="changeTF('1W')">W1</button>
            <button onclick="changeTF('1M')">MN</button>
        </div>

    </section>

    <!-- RIGHT: Auto Analysis -->
    <section class="card">
        <h2>Auto Technical Analysis</h2>
        <div id="tradingview-analysis"></div>
    </section>

</div>

<!-- SMC TOOL SECTION -->
<section class="card">
    <h2>🔮 Smart Money Concepts Tools (Auto + Manual)</h2>

    <div class="input-grid">
        <div>
            <label>High</label>
            <input id="high" type="number" step="0.01">
        </div>
        <div>
            <label>Low</label>
            <input id="low" type="number" step="0.01">
        </div>
        <div>
            <label>Current Price</label>
            <input id="current" type="number" step="0.01">
        </div>
    </div>

    <button onclick="calculateSMC()">Generate Analysis</button>

    <div id="signalBadge" class="badge">SIGNAL: -</div>

    <div id="details" class="result-box"></div>
</section>

<script src="libs/smc.js"></script>

</body>
</html>
