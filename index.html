<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Dashboard - XAUUSD</title>

    <script src="https://s3.tradingview.com/tv.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📊 SMC - XAUUSD (OANDA)</h1>
</header>

<div class="layout">
    <section class="card">
        <h2>TradingView Chart</h2>
        <div id="tv-chart" style="height: 420px;"></div>

        <div class="tf-selector" id="tfButtons"></div>
    </section>

    <section class="card">
        <h2>Auto Technical Analysis</h2>
        <div id="tradingview-analysis"></div>
        <div id="output" class="result-box">Menunggu data market...</div>
    </section>
</div>

<section class="card">
    <h2>🔮 Smart Money Concepts Tools (Manual Input)</h2>

    <div class="input-grid">
        <div>
            <label>High</label>
            <input id="high" type="number" step="0.01">
        </div>
        <div>
            <label>Low</label>
            <input id="low" type="number" step="0.01">
        </div>
        <div>
            <label>Current Price</label>
            <input id="current" type="number" step="0.01">
        </div>
    </div>

    <button onclick="calculateSMC()">Generate Manual Analysis</button>

    <div id="signalBadge" class="badge">SIGNAL: -</div>
</section>

<script src="libs/smc.js"></script>

<script src="script.js"></script>

</body>
</html>
